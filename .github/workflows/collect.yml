name: Veri Topla (CMC + 6 Borsa)

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketi yukle
        run: pip install requests

      - name: CMC verisini cek
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python collect.py cmc

      - name: 6 borsa verisini cek
        env:
          CMC_API_KEY: ${{ secrets.CMC_API_KEY }}
        run: python collect.py github

      - name: Sonuclari kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cmc.json borsa_github.json arsiv
          git commit -m "Otomatik veri guncellendi" || echo "Degisiklik yok"
          git push
