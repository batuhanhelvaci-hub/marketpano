name: Veri Topla

# Bu dosya GitHub'a her gun otomatik veri cektirir.
on:
  schedule:
    # Her gun saat 09:00 UTC'de calisir = Turkiye saati 12:00 (UTC+3).
    # Saati degistirmek istersen: https://crontab.guru
    - cron: '0 9 * * *'
  # Bu satir sayesinde GitHub'da "Run workflow" butonuyla elle de tetikleyebilirsin.
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketi yukle
        run: pip install requests

      - name: Veriyi cek
        run: python collect.py

      - name: data.json'u kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git commit -m "Veri guncellendi: $(date -u +%Y-%m-%d)" || echo "Degisiklik yok"
          git push
